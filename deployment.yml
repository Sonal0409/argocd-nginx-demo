
apiVersion: apps/v1
kind: Deployment
metadata:
 name: nginx-demo
spec:
 replicas: 2
 selector:
  matchLabels:
   app: nginx-demo
 template:
  metadata:
   labels:
    app: nginx-demo
  spec:
   containers:
    - name: nginx
      image: nginx:latest
      ports:
      - containerPort: 80
      volumeMounts:
        - name: html-volume  # configmap to fetch the index.html file
          mountPath: /usr/share/nginx/html # this is container path
   volumes:
    - name: html-volume
      configMap:
        name: nginx-html
